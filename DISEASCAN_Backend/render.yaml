# ── Render Blueprint ──────────────────────────────────────────────────────────
# Docs: https://docs.render.com/blueprint-spec
#
# Deploy:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect the repo → Render reads this file and creates the service
# ──────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: diseascan-backend
    runtime: python
    region: oregon                          # closest free-tier region

    # ── Build ────────────────────────────────────────────────────────────
    buildCommand: |
      apt-get update -qq && apt-get install -y git-lfs > /dev/null 2>&1
      git lfs install
      git lfs pull
      pip install -r requirements.txt

    # ── Start ────────────────────────────────────────────────────────────
    # Render injects $PORT automatically. Bind to 0.0.0.0 so it's reachable.
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    # ── Environment ──────────────────────────────────────────────────────
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.14"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"                         # suppress TF info/warning logs
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"                         # avoid oneDNN numerical warnings

    # ── Plan ─────────────────────────────────────────────────────────────
    plan: free                             # change to "starter" for always-on
